name: deploy
on:
  push:
    branches:
      - main
      - master
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NO_MKDOCS_2_WARNING: 1 # 屏蔽 MkDocs 2.0 的升级警告
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install "mkdocs<2" "mkdocs-material" # 锁定稳定的 MkDocs 1.x 版本
      - run: mkdocs gh-deploy --force
